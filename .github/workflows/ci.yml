name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install pytest
        run: pip install pytest
      - name: py_compile every hook
        run: python -m py_compile hooks/*.py
      - name: pytest
        run: pytest tests/ -q

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        run: |
          sudo apt-get update -qq && sudo apt-get install -yqq shellcheck
          shellcheck hooks/*.sh
